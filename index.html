<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nathscore — Copa 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f1eb;--surface:#fff;--surface2:#f0ede5;--border:#e2ddd4;--border2:#c9c3b8;
  --text:#1a1612;--text2:#6b6358;--text3:#a09890;
  --green:#16a34a;--green-light:#dcfce7;
  --red:#dc2626;--red-light:#fee2e2;
  --amber:#b45309;--amber-light:#fef3c7;
  --blue:#1d4ed8;
  --radius:10px;--radius-sm:6px;--radius-xs:4px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f0d0a;--surface:#1c1a16;--surface2:#272420;--border:#332f28;--border2:#4a4540;
  --text:#f5f0e8;--text2:#9a9080;--text3:#5a5248;
  --green-light:#14532d;--red-light:#7f1d1d;--amber-light:#713f12;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:540px;margin:0 auto;background:var(--surface);min-height:100vh;border-left:1px solid var(--border);border-right:1px solid var(--border)}



/* HEADER */
.hdr{padding:1rem 1.25rem .85rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:20}
.logo{width:38px;height:38px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.app-name{font-size:18px;font-weight:700}
.app-sub{font-size:11px;color:var(--text2);margin-top:1px}
.sync-dot{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);flex-shrink:0;cursor:pointer}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.dot.ok{background:var(--green)}.dot.err{background:var(--red)}.dot.spin{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:.85rem 1.25rem;border-bottom:1px solid var(--border)}
.stat{background:var(--surface2);border-radius:var(--radius-sm);padding:8px 6px;text-align:center}
.stat-num{font-size:20px;font-weight:700}
.stat-label{font-size:10px;color:var(--text2);margin-top:1px;text-transform:uppercase;letter-spacing:.04em}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-amber{color:var(--amber)}.c-blue{color:var(--blue)}

/* TODAY BANNER */
.today-banner{margin:.85rem 1.25rem .4rem;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.today-header{background:var(--green);padding:8px 14px}
.today-header span{font-size:12px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.06em}
.today-match{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface)}
.today-match:last-child{border-bottom:none}
.today-time{font-size:11px;font-weight:700;color:var(--green);min-width:42px}
.today-teams{font-size:13px;font-weight:500;flex:1}
.today-score{font-size:13px;font-weight:700}

/* TABS */
.tabs-wrap{border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;padding:0 .75rem;white-space:nowrap}
.tab{padding:8px 10px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab:hover{color:var(--text)}

/* CONTENT */
.content{padding-bottom:2rem}
.group-hdr{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem .35rem}
.group-hdr-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em}

/* MATCH CARD */
.match-card{margin:0 1.25rem 7px;border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;background:var(--surface)}
.match-card.cravou{border-left:3px solid var(--green)}
.match-card.parcial{border-left:3px solid var(--amber)}
.match-card.errou{border-left:3px solid var(--red)}
.match-top{display:flex;align-items:center;gap:8px}
.team{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:44px;max-width:52px}
.flag{font-size:20px;line-height:1}
.tcode{font-size:9px;font-weight:700;color:var(--text2);text-align:center}
.score-block{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.pred-row{display:flex;align-items:center;gap:6px}
.pscore{font-size:19px;font-weight:700}
.sep{font-size:11px;color:var(--text3)}
.pred-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.badge{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:700;display:inline-block;margin-top:1px}
.badge.cravou{background:var(--green-light);color:var(--green)}
.badge.parcial{background:var(--amber-light);color:var(--amber)}
.badge.errou{background:var(--red-light);color:var(--red)}
.badge.pendente{background:var(--surface2);color:var(--text3)}
.official-row{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:3px}
.official-label{font-size:10px;color:var(--text3)}
.edit-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:0 2px;line-height:1;transition:color .15s}
.edit-btn:hover{color:var(--amber)}
.edit-row{display:flex;align-items:center;gap:7px;margin-top:9px;border-top:1px solid var(--border);padding-top:9px}
.edit-row label{font-size:10px;color:var(--amber);flex:1;font-weight:600}

/* INPUT */
.input-row{display:flex;align-items:center;gap:7px;margin-top:9px;border-top:1px solid var(--border);padding-top:9px}
.input-row label{font-size:10px;color:var(--text2);flex:1}
.sinputs{display:flex;align-items:center;gap:4px}
.sinputs input{width:34px;height:26px;border:1px solid var(--border2);border-radius:var(--radius-xs);text-align:center;font-size:13px;font-weight:700;background:var(--surface2);color:var(--text)}
.sinputs input:focus{outline:none;border-color:var(--green)}
.sinputs span{color:var(--text3);font-size:12px}
.save-btn{font-size:10px;padding:4px 10px;border:1px solid var(--border2);border-radius:var(--radius-xs);cursor:pointer;background:none;color:var(--text2);font-weight:600;transition:all .15s}
.save-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}

/* BONUS */
.bonus-wrap{padding:.85rem 1.25rem 2rem;display:flex;flex-direction:column;gap:10px}
.bonus-card{border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;background:var(--surface)}
.bonus-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.bonus-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);gap:8px}
.bonus-item:last-child{border-bottom:none;padding-bottom:0}
.bl{font-size:13px;color:var(--text2);flex:1}
.bonus-btns{display:flex;gap:5px;flex-shrink:0}
.bonus-badge{font-size:10px;padding:3px 10px;border-radius:12px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);transition:all .15s;white-space:nowrap}
.bonus-badge.hit{background:var(--green-light);color:var(--green);border-color:var(--green)}
.bonus-badge.miss{background:var(--red-light);color:var(--red);border-color:var(--red)}
.podium-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.podium-item{text-align:center;padding:10px 6px;background:var(--surface2);border-radius:var(--radius-sm)}
.podium-place{font-size:10px;color:var(--text2);margin-bottom:4px}
.podium-flag{font-size:18px;line-height:1.4}
.podium-team{font-size:12px;font-weight:700}
.podium-result{margin-top:5px;display:flex;gap:4px;justify-content:center}

/* MATA-MATA */
.ko-wrap{padding:.85rem 1.25rem 2rem}
.ko-phase{margin-bottom:16px}
.ko-phase-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.ko-card{border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;background:var(--surface);margin-bottom:7px}
.ko-match{display:flex;align-items:center;gap:6px}
.ko-team{display:flex;align-items:center;gap:5px;flex:1}
.ko-flag{font-size:16px}
.ko-name{font-size:12px;font-weight:600}
.ko-tbd{font-size:11px;color:var(--text3);font-style:italic}
.ko-score{font-size:13px;font-weight:700;text-align:center;min-width:40px;color:var(--text)}
.ko-input-row{display:flex;align-items:center;gap:5px;margin-top:7px;border-top:1px solid var(--border);padding-top:7px;flex-wrap:wrap}
.ki{width:52px;height:24px;border:1px solid var(--border2);border-radius:4px;text-align:center;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text);padding:0 4px}
.ki.score{width:28px}

/* MISC */
.loading-state{padding:3rem 1.25rem;text-align:center;color:var(--text2);font-size:13px}
.loader{width:24px;height:24px;margin:0 auto 12px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{padding:1.25rem;text-align:center;font-size:10px;color:var(--text3);border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="app">



<div class="hdr">
  <div class="logo">🏆</div>
  <div>
    <div class="app-name">Nathscore</div>
    <div class="app-sub">Palpites da Nath — Copa 2026</div>

</div>

<div class="footer">Nathscore · Copa do Mundo 2026</div>
</div>

// ── ESTADO ──────────────────────────────────────────────────────
let db={};
let currentGroup='hoje';

// ── FIREBASE REST (sem SDK) ──────────────────────────────────────
function fbConfigured(){
  return FIREBASE_URL && !FIREBASE_URL.includes('SEU-BANCO-AQUI');
}

async function loadDB(){
  setSyncStatus('spin','sincronizando...');
  // Sempre parte dos dados conhecidos como base imutável
  const base={};
  for(const[id,s] of Object.entries(KNOWN)) base[id]={h:s.h,a:s.a};

  if(!fbConfigured()){
    db=base;
    setSyncStatus('err','Firebase não configurado');
    recalc(); renderContent(currentGroup);
    return;
  }
  try{
    const res=await fetch(`${FIREBASE_URL}${DB_PATH}`);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const remote=await res.json();
    db=Object.assign({},base); // começa com KNOWN
    if(remote && typeof remote==='object'){
      for(const[k,v] of Object.entries(remote)){
        if(!KNOWN[k]) db[k]=v; // só aceita dados remotos para jogos não-KNOWN
      }
    }
    const t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('ok','ok · '+t);
  }catch(e){
    db=base;
    setSyncStatus('err','offline · dados locais');
  }
  recalc(); renderContent(currentGroup);
}

async function saveDB(){
  if(!fbConfigured()) return;
  setSyncStatus('spin','salvando...');
  try{
    // Envia só os dados que não são KNOWN (evita sobrescrever resultados fixos)
    const toSave={};
    for(const[k,v] of Object.entries(db)){
      if(!KNOWN[k]) toSave[k]=v;
    }
    const res=await fetch(`${FIREBASE_URL}${DB_PATH}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(toSave)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const t=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('ok','salvo · '+t);
  }catch(e){
    setSyncStatus('err','erro ao salvar');
  }
}

function setSyncStatus(s,t){
  document.getElementById('syncDot').className='dot '+s;
  document.getElementById('syncTxt').textContent=t;
}

// ── DATA LOCAL (corrige bug de fuso UTC) ────────────────────────
function getLocalDateStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── LÓGICA ──────────────────────────────────────────────────────
function getResult(id){return db[id]||null}

function compare(ph,pa,oh,oa){
  if(ph===oh&&pa===oa) return 'cravou';
  const pw=ph>pa?'H':ph<pa?'A':'D';
  const rw=oh>oa?'H':oh<oa?'A':'D';
  return pw===rw?'parcial':'errou';
}

function recalc(){
  let cr=0,pa=0,er=0;
  for(const grp of Object.values(NATH))
    for(const m of grp){
      const off=getResult(m.id);
      if(!off) continue;
      const r=compare(m.ph,m.pa,off.h,off.a);
      if(r==='cravou') cr++; else if(r==='parcial') pa++; else er++;
    }
  document.getElementById('sCravou').textContent=cr;
  document.getElementById('sParcial').textContent=pa;
  document.getElementById('sErrou').textContent=er;
}

// ── TODAY ────────────────────────────────────────────────────────
function getTodayGames(){
  const today=getLocalDateStr();
  return SCHEDULE
    .filter(([,,, date])=>date===today)
    .map(([id,h,a,,hora])=>{
      let nathMatch=null;
      for(const grp of Object.values(NATH)){
        const m=grp.find(x=>x.id===id);
        if(m){nathMatch=m;break;}
      }
      return {id,h,a,hora,off:getResult(id),nathMatch};
    });
}

function renderTodayBanner(){
  const sec=document.getElementById('todaySection');
  const games=getTodayGames();
  if(!games.length){sec.innerHTML='';return;}
  let html=`<div class="today-banner"><div class="today-header"><span>📅 Jogos de Hoje</span></div>`;
  for(const g of games){
    const s=g.off?`${g.off.h}–${g.off.a}`:'';
    html+=`<div class="today-match">
      <span class="today-time">${g.hora}</span>
      <span class="today-teams">${F[g.h]||''} ${g.h} × ${g.a} ${F[g.a]||''}</span>
      <span class="today-score">${s}</span>
    </div>`;
  }
  sec.innerHTML=html+'</div>';
}

// ── CARD ─────────────────────────────────────────────────────────
function matchCard(m){
  const off=getResult(m.id);
  const isKnown=!!KNOWN[m.id];
  let rc='',badge='',offHtml='';
  if(off){
    const r=compare(m.ph,m.pa,off.h,off.a);
    rc=r;
    const lbl={cravou:'🎯 Cravou!',parcial:'~ Parcial',errou:'✗ Errou'};
    badge=`<span class="badge ${r}">${lbl[r]}</span>`;
    // lápis aparece para todos os resultados (incluindo KNOWN, pois erros acontecem)
    offHtml=`<span class="official-label">oficial: ${off.h}×${off.a}</span>
      <button class="edit-btn" onclick="toggleEdit('${m.id}')" title="Editar resultado">✏️</button>`;
  } else {
    badge=`<span class="badge pendente">Aguardando</span>`;
  }
  // campo de entrada: jogos sem resultado E não-KNOWN, OU no modo edição
  const editing=editingSet.has(m.id);
  const showInput=(!off&&!isKnown)||editing;
  const inp=showInput?`<div class="${editing?'edit-row':'input-row'}">
    <label>${editing?'✏️ Editando:':'Resultado oficial:'}</label>
    <div class="sinputs">
      <input type="number" min="0" max="30" id="h_${m.id}" placeholder="—" value="${editing&&off?off.h:''}">
      <span>×</span>
      <input type="number" min="0" max="30" id="a_${m.id}" placeholder="—" value="${editing&&off?off.a:''}">
    </div>
    <button class="save-btn" onclick="doSave('${m.id}')">Salvar</button>
    ${editing?`<button class="save-btn" onclick="cancelEdit('${m.id}')" style="margin-left:2px">Cancelar</button>`:''}
  </div>`:'';
  return `<div class="match-card ${rc}" id="card_${m.id}">
    <div class="match-top">
      <div class="team"><span class="flag">${F[m.h]||'🏳'}</span><span class="tcode">${m.h}</span></div>
      <div class="score-block">
        <div class="pred-row"><span class="pscore">${m.ph}</span><span class="sep">×</span><span class="pscore">${m.pa}</span></div>
        <div class="pred-label">palpite</div>
        <div>${badge}</div>
        <div class="official-row">${offHtml}</div>
      </div>
      <div class="team"><span class="flag">${F[m.a]||'🏳'}</span><span class="tcode">${m.a}</span></div>
    </div>${inp}</div>`;
}

// ── RENDERS ──────────────────────────────────────────────────────
function renderContent(grp){
  currentGroup=grp;
  renderTodayBanner();
  const c=document.getElementById('content');
  if(grp==='hoje') return renderHoje(c);
  if(grp==='bonus') return renderBonus(c);
  if(grp==='mata') return renderMata(c);
  renderGroup(grp,c);
}

function renderGroup(grp,c){
  const matches=NATH[grp];
  if(!matches){c.innerHTML='';return;}
  let html=`<div class="group-hdr"><span class="group-hdr-label">Grupo ${grp} — palpites da Nath</span></div>`;
  for(const m of matches) html+=matchCard(m);
  c.innerHTML=html;
}

function renderHoje(c){
  const games=getTodayGames();
  if(!games.length){
    c.innerHTML=`<div class="loading-state">Sem jogos hoje 🌙<br><br><small style="color:var(--text3)">Veja os grupos nas abas acima</small></div>`;
    return;
  }
  let html=`<div class="group-hdr"><span class="group-hdr-label">Jogos de hoje</span></div>`;
  for(const g of games) if(g.nathMatch) html+=matchCard(g.nathMatch);
  c.innerHTML=html;
}

function renderBonus(c){
  const bd=[
    {id:'artilheiro',icon:'⚽',label:'Artilheiro',value:'Kylian Mbappé'},
    {id:'garcom',icon:'🎯',label:'Garçom',value:'Lamine Yamal'},
    {id:'mvp',icon:'⭐',label:'MVP',value:'Endrick'},
  ];
  const pd=[
    {id:'campeao',medal:'🥇',label:'Campeão',flag:'🇧🇷',team:'BRA'},

  for(const b of bd){
    const v=db['bonus_'+b.id];
    html+=`<div class="bonus-item">
      <span class="bl">${b.icon} <strong>${b.label}:</strong> ${b.value}</span>
      <div class="bonus-btns">
        <span class="bonus-badge ${v==='hit'?'hit':''}" onclick="toggleBonus('${b.id}','hit')">✓ Acertou</span>
        <span class="bonus-badge ${v==='miss'?'miss':''}" onclick="toggleBonus('${b.id}','miss')">✗ Errou</span>
      </div>
    </div>`;
  }
  html+=`</div><div class="bonus-card"><div class="bonus-title">Pódio Final</div><div class="podium-grid">`;
  for(const p of pd){
    const v=db['bonus_'+p.id];
    html+=`<div class="podium-item">
      <div class="podium-place">${p.medal} ${p.label}</div>
      <div class="podium-flag">${p.flag}</div>

      <div class="podium-result">

        <span class="bonus-badge ${v==='miss'?'miss':''}" onclick="toggleBonus('${p.id}','miss')">✗</span>
      </div>
    </div>`;
  }
  html+=`</div></div></div>`;
  c.innerHTML=html;

function renderMata(c){
  let html=`<div class="ko-wrap">`;
  for(const phase of KO_PHASES){
    html+=`<div class="ko-phase"><div class="ko-phase-title">${phase.label}</div>`;
    for(const m of phase.matches){
      const s=db['ko_'+m.id]||{};
      const hf=F[s.h]||'';const af=F[s.a]||'';
      const scoreStr=(s.hs!==undefined&&s.as!==undefined)?`${s.hs}–${s.as}`:'';
      html+=`<div class="ko-card">
        <div class="ko-match">
          <div class="ko-team">
            <span class="ko-flag">${hf}</span>
            <span class="${s.h?'ko-name':'ko-tbd'}">${s.h||'A definir'}</span>
          </div>
          <div class="ko-score">${scoreStr}</div>
          <div class="ko-team" style="justify-content:flex-end">
            <span class="${s.a?'ko-name':'ko-tbd'}">${s.a||'A definir'}</span>
            <span class="ko-flag">${af}</span>
          </div>
        </div>
        <div class="ko-input-row">
          <input class="ki" placeholder="Time casa" id="ko_h_${m.id}" value="${s.h||''}">
          <input class="ki" placeholder="Time fora" id="ko_a_${m.id}" value="${s.a||''}">
          <input class="ki score" type="number" min="0" placeholder="G" id="ko_hs_${m.id}" value="${s.hs!==undefined?s.hs:''}">
          <span style="font-size:10px;color:var(--text3)">×</span>
          <input class="ki score" type="number" min="0" placeholder="G" id="ko_as_${m.id}" value="${s.as!==undefined?s.as:''}">
          <button class="save-btn" onclick="doSaveKO('${m.id}')">Salvar</button>
        </div>
      </div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  c.innerHTML=html;
}

// ── AÇÕES ────────────────────────────────────────────────────────
const editingSet = new Set(); // IDs de jogos em modo edição

function toggleEdit(id){
  if(editingSet.has(id)) editingSet.delete(id);
  else editingSet.add(id);
  renderContent(currentGroup);
}

function cancelEdit(id){
  editingSet.delete(id);
  renderContent(currentGroup);
}

async function doSave(id){
  const h=parseInt(document.getElementById('h_'+id)?.value);
  const a=parseInt(document.getElementById('a_'+id)?.value);
  if(isNaN(h)||isNaN(a)) return;
  db[id]={h,a};
  editingSet.delete(id); // sai do modo edição após salvar
  await saveDB();
  recalc(); renderContent(currentGroup);
}

async function doSaveKO(id){
  const h=(document.getElementById('ko_h_'+id)?.value||'').trim().toUpperCase();
  const a=(document.getElementById('ko_a_'+id)?.value||'').trim().toUpperCase();
  const hs=document.getElementById('ko_hs_'+id)?.value;
  const as_=document.getElementById('ko_as_'+id)?.value;
  db['ko_'+id]={
    h,a,
    hs:hs!==''?parseInt(hs):undefined,
    as:as_!==''?parseInt(as_):undefined
  };
  await saveDB(); renderContent(currentGroup);
}

async function toggleBonus(id,val){
  const key='bonus_'+id;
  db[key]=db[key]===val?undefined:val;
  await saveDB(); renderContent(currentGroup);
}

// ── TABS ─────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab');
  if(!btn) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderContent(btn.dataset.g);
});
